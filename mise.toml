min_version = "2025.1.0"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["node"]

[bootstrap.hooks]
pre-packages = "scripts/setup-repos.sh"

# --- System Packages (Fedora/DNF) ---
[bootstrap.packages]
"dnf:@development-tools" = "latest"
"dnf:curl" = "latest"
"dnf:wget" = "latest"
"dnf:git" = "latest"
"dnf:vim" = "latest"
"dnf:fish" = "latest"
"dnf:tmux" = "latest"
"dnf:htop" = "latest"
"dnf:jq" = "latest"
"dnf:unzip" = "latest"
"dnf:ripgrep" = "latest"
"dnf:fd-find" = "latest"
"dnf:bat" = "latest"
"dnf:fzf" = "latest"
"dnf:tree" = "latest"
"dnf:net-tools" = "latest"
"dnf:ca-certificates" = "latest"
"dnf:gnupg2" = "latest"
"dnf:util-linux-user" = "latest"
"dnf:zoxide" = "latest"
"dnf:fastfetch" = "latest"
"dnf:starship" = "latest"
"dnf:eza" = "latest"
"dnf:neovim" = "latest"
"dnf:python3-neovim" = "latest"
"dnf:fuse" = "latest"
"dnf:chromium" = "latest"
"dnf:google-chrome-stable" = "latest"
"dnf:code" = "latest"
"dnf:docker-ce" = "latest"
"dnf:docker-ce-cli" = "latest"
"dnf:containerd.io" = "latest"
"dnf:docker-buildx-plugin" = "latest"
"dnf:docker-compose-plugin" = "latest"
"dnf:ghostty" = "latest"
"dnf:@virtualization" = "latest"

# --- User Settings ---
[bootstrap.user]
login_shell = "/usr/bin/fish"

# --- Dotfiles (symlinked to ~) ---
[system.files]
"~/.config/fish/config.fish" = "dotfiles/config/fish/config.fish"
"~/.gitconfig" = "dotfiles/gitconfig"
"~/.config/starship.toml" = "dotfiles/config/starship.toml"

# --- Dev Tools ---
[tools]
node = "lts"
bun = "latest"
java = "17"
swift = "latest"
ast-grep = "latest"

# --- Bootstrap Task (runs automatically as last step of `mise bootstrap`) ---
[tasks.bootstrap]
description = "Install Nerd Fonts, Android Studio, Flatpaks, and services"
run = "scripts/post-bootstrap.sh"

