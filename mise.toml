min_version = "2025.1.0"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["node"]

# --- System Packages (Fedora/DNF) ---
[bootstrap.packages]
"dnf:@development-tools" = "latest"
"dnf:curl" = "latest"
"dnf:wget" = "latest"
"dnf:git" = "latest"
"dnf:vim" = "latest"
"dnf:fish" = "latest"
"dnf:tmux" = "latest"
"dnf:htop" = "latest"
"dnf:jq" = "latest"
"dnf:unzip" = "latest"
"dnf:ripgrep" = "latest"
"dnf:fd-find" = "latest"
"dnf:bat" = "latest"
"dnf:fzf" = "latest"
"dnf:tree" = "latest"
"dnf:net-tools" = "latest"
"dnf:ca-certificates" = "latest"
"dnf:gnupg2" = "latest"
"dnf:util-linux-user" = "latest"
"dnf:zoxide" = "latest"
"dnf:fastfetch" = "latest"
"dnf:starship" = "latest"
"dnf:eza" = "latest"

# --- User Settings ---
[bootstrap.user]
login_shell = "/usr/bin/fish"

# --- Dotfiles (symlinked to ~) ---
[system.files]
"~/.config/fish/config.fish" = "dotfiles/config/fish/config.fish"
"~/.gitconfig" = "dotfiles/gitconfig"
"~/.config/starship.toml" = "dotfiles/config/starship.toml"

# --- Dev Tools ---
[tools]
node = "lts"
bun = "latest"
java = "17"
swift = "latest"
ast-grep = "latest"
